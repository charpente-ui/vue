name: Release

on:
  push:
    branches: [ "main", "develop", "beta" ]
  pull_request:
    branches: [ "main", "develop", "beta" ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Tests
        run: npm run test

      - name: Tests Reporter
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Tests
          path: junit.xml
          reporter: java-junit

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' }}

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
